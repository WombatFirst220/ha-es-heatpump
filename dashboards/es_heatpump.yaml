# ES Heatpump Dashboard – automatisch installiert durch die HACS-Integration
# Dieses File darf NUR "views:" enthalten – kein "title:" auf oberster Ebene!
# Der Titel wird in der Dashboard-Registrierung gesetzt, nicht hier.

views:
  # ── View 1: Übersicht ───────────────────────────────────────────────────
  - title: Übersicht
    path: overview
    icon: mdi:heat-pump
    cards:

      - type: markdown
        content: >
          ## 🌡️ ES Wärmepumpe

      # ── Temperaturen ──────────────────────────────────────────────────
      - type: entities
        title: Temperaturen
        icon: mdi:thermometer
        entities:
          - entity: sensor.es_wp_aussentemperatur
            name: Außentemperatur
          - entity: sensor.es_wp_heizkreis_temperatur
            name: Heizkreis (Vorlauf)
          - entity: sensor.es_wp_vorlauftemperatur
            name: Vorlauftemperatur
          - entity: sensor.es_wp_rucklauftemperatur
            name: Rücklauftemperatur
          - entity: sensor.es_wp_warmwasser_ist
            name: Warmwasser Ist
          - entity: sensor.es_wp_heizen_solltemperatur
            name: Heizen Soll
          - entity: sensor.es_wp_raumtemperatur
            name: Raumtemperatur
          - entity: sensor.es_wp_mischventil_1_temperatur
            name: Mischventil 1
          - entity: sensor.es_wp_mischventil_2_temperatur
            name: Mischventil 2

      # ── Temperaturverlauf ──────────────────────────────────────────────
      - type: history-graph
        title: Temperaturverlauf (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.es_wp_aussentemperatur
            name: Außen
          - entity: sensor.es_wp_heizkreis_temperatur
            name: Heizkreis
          - entity: sensor.es_wp_warmwasser_ist
            name: Warmwasser
          - entity: sensor.es_wp_raumtemperatur
            name: Raum

      # ── Betrieb & Leistung ─────────────────────────────────────────────
      - type: entities
        title: Betrieb & Leistung
        icon: mdi:lightning-bolt
        entities:
          - entity: sensor.es_wp_betriebsmodus
            name: Betriebsmodus
          - entity: sensor.es_wp_kompressor_frequenz
            name: Kompressor Frequenz
          - entity: sensor.es_wp_kompressor_drehzahl_berechnet
            name: Kompressor Drehzahl
          - entity: sensor.es_wp_lufter_drehzahl
            name: Lüfter Drehzahl
          - entity: sensor.es_wp_leistungsaufnahme
            name: Leistungsaufnahme
          - entity: sensor.es_wp_spannung
            name: Spannung

      # ── Pumpen ────────────────────────────────────────────────────────
      - type: entities
        title: Pumpen
        icon: mdi:pump
        entities:
          - entity: sensor.es_wp_pumpe_p0_status
            name: Pumpe P0
          - entity: sensor.es_wp_pumpe_p1_status
            name: Pumpe P1
          - entity: sensor.es_wp_pumpe_p2_status
            name: Pumpe P2

      # ── Energie ───────────────────────────────────────────────────────
      - type: entities
        title: Energie
        icon: mdi:counter
        entities:
          - entity: sensor.es_wp_energie_gesamt
            name: Energie gesamt
          - entity: sensor.es_wp_ah_betriebszeit
            name: AH Betriebszeit
          - entity: sensor.es_wp_hbh_betriebszeit
            name: HBH Betriebszeit
          - entity: sensor.es_wp_hwtbh_betriebszeit
            name: HWTBH Betriebszeit

      # ── Gerät ─────────────────────────────────────────────────────────
      - type: entities
        title: Geräteinfo
        icon: mdi:information-outline
        entities:
          - entity: sensor.es_wp_software_version
            name: Software Version

  # ── View 2: Energiebilanz ───────────────────────────────────────────────
  - title: Energiebilanz
    path: energy
    icon: mdi:lightning-bolt
    cards:
      - type: statistics-graph
        title: Energie gesamt – Verlauf
        entities:
          - entity: sensor.es_wp_energie_gesamt
            name: Energie gesamt
        chart_type: bar
        period: day
        days_to_show: 14

      - type: history-graph
        title: Kompressor Frequenz (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.es_wp_kompressor_frequenz
            name: Kompressor Hz
          - entity: sensor.es_wp_lufter_drehzahl
            name: Lüfter rpm

  # ── View 3: Alle Parameter (Diagnose) ──────────────────────────────────
  - title: Diagnose
    path: diagnose
    icon: mdi:bug-outline
    cards:
      - type: entities
        title: Alle Rohdaten (parXX)
        show_header_toggle: false
        entities:
          - entity: sensor.es_wp_aussentemperatur
          - entity: sensor.es_wp_vorlauftemperatur
          - entity: sensor.es_wp_rucklauftemperatur
          - entity: sensor.es_wp_warmwasser_ist
          - entity: sensor.es_wp_heizen_solltemperatur
          - entity: sensor.es_wp_heizkreis_temperatur
          - entity: sensor.es_wp_mischventil_1_temperatur
          - entity: sensor.es_wp_mischventil_2_temperatur
          - entity: sensor.es_wp_raumtemperatur
          - entity: sensor.es_wp_betriebsmodus
          - entity: sensor.es_wp_kompressor_frequenz
          - entity: sensor.es_wp_kompressor_drehzahl_berechnet
          - entity: sensor.es_wp_lufter_drehzahl
          - entity: sensor.es_wp_leistungsaufnahme
          - entity: sensor.es_wp_spannung
          - entity: sensor.es_wp_energie_gesamt
          - entity: sensor.es_wp_ah_betriebszeit
          - entity: sensor.es_wp_hbh_betriebszeit
          - entity: sensor.es_wp_hwtbh_betriebszeit
          - entity: sensor.es_wp_software_version
          - entity: sensor.es_wp_temperatur_par22
          - entity: sensor.es_wp_temperatur_par25
          - entity: sensor.es_wp_temperatur_par30
