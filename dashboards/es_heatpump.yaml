# ES Heatpump Dashboard – v2 (2026-05-18)
# Automatisch installiert durch die HACS-Integration.
# Verwendet die neuen Entity-IDs (sensor.es_hp_*) — Migration läuft beim Setup.
#
# WICHTIG: Datei darf nur "views:" auf oberster Ebene haben. Titel/Icon werden
# in dashboard.py beim Registrieren des Storage-Eintrags gesetzt.

views:
  # ────────────────────────────────────────────────────────────────────────
  # View 1: Übersicht
  # ────────────────────────────────────────────────────────────────────────
  - title: Übersicht
    path: overview
    icon: mdi:heat-pump
    badges:
      - type: entity
        entity: sensor.es_hp_betriebsart
        name: Modus
      - type: entity
        entity: sensor.es_hp_aktueller_cop
        name: COP
      - type: entity
        entity: sensor.es_hp_aussentemp_ta
        name: Außen

    cards:
      # ── Header ─────────────────────────────────────────────────────────
      - type: markdown
        content: |
          ## 🌡️ Energy Save AW12-R32
          Status der Wärmepumpe – Daten aus myheatpump.com

      # ── Gauges: COP, Wärmeabgabe, El. Leistung, Heizwasser, Brauchwasser ─
      - type: grid
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.es_hp_aktueller_cop
            name: COP
            min: 0
            max: 6
            needle: true
            severity:
              green: 3.5
              yellow: 2
              red: 0

          - type: gauge
            entity: sensor.es_hp_thermische_leistung
            name: Wärmeabgabe
            min: 0
            max: 12000
            needle: true

          - type: gauge
            entity: sensor.es_hp_leistung_elektrisch
            name: El. Leistung
            min: 0
            max: 5000
            needle: true

          - type: gauge
            entity: sensor.es_hp_heizen
            name: Heizwasser
            min: 0
            max: 50
            needle: true
            severity:
              green: 15
              yellow: 25
              red: 35

          - type: gauge
            entity: sensor.es_hp_warmwasser_tw
            name: Brauchwasser
            min: 0
            max: 60
            needle: true
            severity:
              green: 20
              yellow: 30
              red: 45

          - type: gauge
            entity: sensor.es_hp_spreizung
            name: Spreizung
            min: -2
            max: 10
            needle: true
            severity:
              green: 3
              yellow: 6
              red: 8

      # ── Temperaturen ───────────────────────────────────────────────────
      - type: entities
        title: Temperaturen
        icon: mdi:thermometer-lines
        state_color: false
        entities:
          - entity: sensor.es_hp_vorlauf_tuo
            name: Vorlauf
          - entity: sensor.es_hp_ruecklauf_tui
            name: Rücklauf
          - entity: sensor.es_hp_spreizung
            name: Spreizung (Δ T)
          - entity: sensor.es_hp_aussentemp_ta
            name: Außentemperatur
          - entity: sensor.es_hp_warmwasser_tw
            name: Warmwasser
          - entity: sensor.es_hp_heizen_soll
            name: Heizen Soll (aktiv)
          - entity: sensor.es_hp_heizen_soll_manuell
            name: Heizen Soll (manuell)
          - entity: sensor.es_hp_heizen
            name: Heizwasser Ist
          - entity: sensor.es_hp_raumtemperatur
            name: Raumtemperatur

      # ── Leistungsverlauf 24h ───────────────────────────────────────────
      - type: history-graph
        title: Leistungsverlauf (24 h)
        hours_to_show: 24
        entities:
          - entity: sensor.es_hp_vorlauf_tuo
            name: Vorlauf
          - entity: sensor.es_hp_ruecklauf_tui
            name: Rücklauf
          - entity: sensor.es_hp_frequenz_hz
            name: Kompressor Hz

      # ── Strom & Leistung ──────────────────────────────────────────────
      - type: entities
        title: Strom & Leistung
        icon: mdi:lightning-bolt
        entities:
          - entity: sensor.es_hp_leistung_elektrisch
            name: Elektrische Aufnahme
          - entity: sensor.es_hp_thermische_leistung
            name: Wärmeabgabe
          - entity: sensor.es_hp_aktueller_cop
            name: Aktueller COP
          - entity: sensor.es_hp_frequenz_hz
            name: Kompressor Frequenz

      # ── System-Technik ─────────────────────────────────────────────────
      - type: glance
        title: System-Technik
        columns: 4
        entities:
          - entity: sensor.es_hp_heissgas_td
            name: Heißgas
          - entity: sensor.es_hp_frequenz_hz
            name: Frequenz
          - entity: sensor.es_hp_betriebsart
            name: Modus
          - entity: sensor.es_hp_spannung
            name: Spannung

  # ────────────────────────────────────────────────────────────────────────
  # View 2: Energie / Statistik
  # ────────────────────────────────────────────────────────────────────────
  - title: Energie
    path: energy
    icon: mdi:lightning-bolt

    cards:
      - type: statistics-graph
        title: COP – Tagesverlauf (7 Tage)
        entities:
          - entity: sensor.es_hp_aktueller_cop
            name: COP
        chart_type: line
        period: hour
        days_to_show: 7
        stat_types:
          - mean

      - type: history-graph
        title: Wärmeabgabe & Kompressor-Frequenz (24 h)
        hours_to_show: 24
        entities:
          - entity: sensor.es_hp_thermische_leistung
            name: Wärmeabgabe (W)
          - entity: sensor.es_hp_frequenz_hz
            name: Frequenz (Hz)

      - type: history-graph
        title: Elektrische Leistung (24 h)
        hours_to_show: 24
        entities:
          - entity: sensor.es_hp_leistung_elektrisch
            name: El. Leistung (W)

      - type: history-graph
        title: Heißgastemperatur (24 h)
        hours_to_show: 24
        entities:
          - entity: sensor.es_hp_heissgas_td
            name: Heißgas Td

      - type: entities
        title: Betriebsstunden
        icon: mdi:counter
        entities:
          - entity: sensor.es_hp_ah_betriebszeit
            name: AH Gesamt
          - entity: sensor.es_hp_hbh_betriebszeit
            name: HBH Gesamt

  # ────────────────────────────────────────────────────────────────────────
  # View 3: Diagnose
  # ────────────────────────────────────────────────────────────────────────
  - title: Diagnose
    path: diagnose
    icon: mdi:bug-outline

    cards:
      - type: markdown
        content: |
          ### Diagnose-Sensoren
          Die mit „Diagnose par…" markierten Sensoren konnten nicht eindeutig
          einer Mess-Größe zugeordnet werden und sind standardmäßig **deaktiviert**.
          Aktivieren unter *Einstellungen → Geräte & Dienste → ES Heatpump →
          Entitäten*.

      - type: entities
        title: Mischventile
        entities:
          - entity: sensor.es_hp_mischventil_1
            name: Mischventil 1
          - entity: sensor.es_hp_mischventil_2
            name: Mischventil 2

      - type: entities
        title: Diagnose-Parameter
        entities:
          - entity: sensor.es_hp_diag_par21
          - entity: sensor.es_hp_diag_par22
          - entity: sensor.es_hp_diag_par23
          - entity: sensor.es_hp_diag_par26
          - entity: sensor.es_hp_diag_par27
          - entity: sensor.es_hp_diag_par39
          - entity: sensor.es_hp_diag_par40

      - type: entities
        title: Geräteinfo
        entities:
          - entity: sensor.es_hp_software_version
            name: Software Version
          - entity: sensor.es_hp_hwtbh_betriebszeit
            name: HWTBH Betriebszeit
