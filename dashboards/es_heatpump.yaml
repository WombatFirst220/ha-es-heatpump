# ============================================================
# ES Heatpump Dashboard  –  "ES Heatpump"
# Importiere diese Datei in Home Assistant über:
#   Einstellungen → Dashboards → Dashboard hinzufügen → YAML
# oder lege sie als Lovelace-Datei ab und referenziere sie
# in configuration.yaml:
#   lovelace:
#     dashboards:
#       es-heatpump:
#         mode: yaml
#         filename: dashboards/es_heatpump.yaml
#         title: ES Heatpump
#         icon: mdi:heat-pump
#         show_in_sidebar: true
# ============================================================

title: ES Heatpump
views:
  - title: Übersicht
    path: overview
    icon: mdi:heat-pump
    cards:

      # ── Header ────────────────────────────────────────────
      - type: markdown
        content: >
          ## 🌡️ Energy Save Wärmepumpe
          Letzte Aktualisierung: {{ states.sensor.es_wp_aussentemperatur.last_changed | relative_time }}

      # ── Temperaturen ──────────────────────────────────────
      - type: entities
        title: Temperaturen
        icon: mdi:thermometer
        entities:
          - entity: sensor.es_wp_aussentemperatur
            name: Außentemperatur
            icon: mdi:thermometer
          - entity: sensor.es_wp_vorlauftemperatur
            name: Vorlauf Ist
            icon: mdi:thermometer-chevron-up
          - entity: sensor.es_wp_vorlauf_soll
            name: Vorlauf Soll
            icon: mdi:thermometer-lines
          - entity: sensor.es_wp_rucklauftemperatur
            name: Rücklauf
            icon: mdi:thermometer-chevron-down
          - entity: sensor.es_wp_warmwasser_ist
            name: Warmwasser Ist
            icon: mdi:water-thermometer
          - entity: sensor.es_wp_warmwasser_soll
            name: Warmwasser Soll
            icon: mdi:water-thermometer-outline
          - entity: sensor.es_wp_heizen_solltemperatur
            name: Heizen Soll
            icon: mdi:thermometer-check

      # ── Temperaturgraph ───────────────────────────────────
      - type: history-graph
        title: Temperaturverlauf (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.es_wp_aussentemperatur
            name: Außen
          - entity: sensor.es_wp_vorlauftemperatur
            name: Vorlauf
          - entity: sensor.es_wp_rucklauftemperatur
            name: Rücklauf
          - entity: sensor.es_wp_warmwasser_ist
            name: Warmwasser

      # ── Betrieb & Leistung ────────────────────────────────
      - type: entities
        title: Betrieb & Leistung
        icon: mdi:lightning-bolt
        entities:
          - entity: sensor.es_wp_betriebsmodus
            name: Betriebsmodus
            icon: mdi:heat-pump
          - entity: sensor.es_wp_leistungsaufnahme
            name: Leistungsaufnahme
            icon: mdi:lightning-bolt
          - entity: sensor.es_wp_heizleistung
            name: Heizleistung
            icon: mdi:heat-wave
          - entity: sensor.es_wp_cop
            name: COP (Arbeitszahl)
            icon: mdi:chart-line
          - entity: sensor.es_wp_kompressor_frequenz
            name: Kompressor
            icon: mdi:sine-wave
          - entity: sensor.es_wp_lufter_drehzahl
            name: Lüfter
            icon: mdi:fan
          - entity: sensor.es_wp_pumpe_heizkreis
            name: Pumpe Heizkreis
            icon: mdi:pump
          - entity: sensor.es_wp_pumpe_warmwasser
            name: Pumpe Warmwasser
            icon: mdi:pump

      # ── Leistungsgraph ────────────────────────────────────
      - type: history-graph
        title: Leistung (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.es_wp_leistungsaufnahme
            name: Aufnahme
          - entity: sensor.es_wp_heizleistung
            name: Heizleistung

      # ── Kältekreis ────────────────────────────────────────
      - type: entities
        title: Kältekreis
        icon: mdi:snowflake
        entities:
          - entity: sensor.es_wp_sauggastemperatur
            name: Sauggas
          - entity: sensor.es_wp_heigastemperatur
            name: Heißgas
          - entity: sensor.es_wp_kondensationstemperatur
            name: Kondensation
          - entity: sensor.es_wp_verdampfungstemperatur
            name: Verdampfung
          - entity: sensor.es_wp_kademittel_hochdruck
            name: Hochdruck
          - entity: sensor.es_wp_kademittel_niederdruck
            name: Niederdruck

      # ── Energie-Statistik ─────────────────────────────────
      - type: entities
        title: Energie gesamt
        icon: mdi:counter
        entities:
          - entity: sensor.es_wp_energie_heizen_gesamt
            name: Wärme Heizen
          - entity: sensor.es_wp_energie_warmwasser_gesamt
            name: Wärme Warmwasser
          - entity: sensor.es_wp_strom_heizen_gesamt
            name: Strom Heizen
          - entity: sensor.es_wp_strom_warmwasser_gesamt
            name: Strom Warmwasser

      # ── Heizkurve ─────────────────────────────────────────
      - type: entities
        title: Heizkurve & Einstellungen
        icon: mdi:chart-bell-curve
        entities:
          - entity: sensor.es_wp_heizkurve_steilheit
            name: Steilheit
          - entity: sensor.es_wp_heizkurve_parallelverschiebung
            name: Parallelverschiebung
          - entity: sensor.es_wp_heizen_einschalttemperatur
            name: Einschalttemperatur
          - entity: sensor.es_wp_warmwasser_ladetemperatur
            name: WW Ladetemperatur
          - entity: sensor.es_wp_warmwasser_hystere
            name: WW Hysterese

      # ── Betriebsstunden ───────────────────────────────────
      - type: entities
        title: Betriebsstunden & Starts
        icon: mdi:timer-outline
        entities:
          - entity: sensor.es_wp_betriebsstunden_kompressor
            name: Kompressor Gesamt
          - entity: sensor.es_wp_betriebsstunden_heizen
            name: Heizen
          - entity: sensor.es_wp_betriebsstunden_warmwasser
            name: Warmwasser
          - entity: sensor.es_wp_starts_kompressor
            name: Kompressor Starts

  # ── zweite View: Energiebilanz ─────────────────────────────
  - title: Energiebilanz
    path: energy
    icon: mdi:lightning-bolt
    cards:
      - type: statistics-graph
        title: Wärme Heizen – Wochenverlauf
        entities:
          - entity: sensor.es_wp_energie_heizen_gesamt
            name: Wärme Heizen
        chart_type: bar
        period: day
        days_to_show: 14

      - type: statistics-graph
        title: Wärme Warmwasser – Wochenverlauf
        entities:
          - entity: sensor.es_wp_energie_warmwasser_gesamt
            name: Wärme WW
        chart_type: bar
        period: day
        days_to_show: 14

      - type: statistics-graph
        title: Stromverbrauch – Wochenverlauf
        entities:
          - entity: sensor.es_wp_strom_heizen_gesamt
            name: Strom Heizen
          - entity: sensor.es_wp_strom_warmwasser_gesamt
            name: Strom WW
        chart_type: bar
        period: day
        days_to_show: 14
